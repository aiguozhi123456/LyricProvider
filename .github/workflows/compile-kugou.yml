name: Build KuGou Music APK (verify only)

on:
  workflow_dispatch:
  push:
    paths:
      - 'kugou-music/**'
      - 'share/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'

jobs:
  assemble-kugou:
    name: Assemble kugou-music debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle with Caching
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: false

      - name: Assemble kugou-music debug APK
        run: ./gradlew :kugou-music:assembleDebug --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kugou-music-debug-apk
          path: kugou-music/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          archive: false
