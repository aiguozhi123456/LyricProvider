name: Build KuGou Music APK (verify only)

on:
  workflow_dispatch:
  push:
    paths:
      - 'kugou-music/**'
      - 'share/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'

jobs:
  assemble-kugou:
    name: Assemble kugou-music debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle with Caching
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: false

      - name: Generate debug keystore for signing
        run: |
          keytool -genkeypair -v \
            -keystore kugou-music/release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android -keypass android
          echo "RELEASE_STORE_FILE=kugou-music/release.jks" >> "$GITHUB_ENV"
          echo "RELEASE_STORE_PASSWORD=android" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=androiddebugkey" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=android" >> "$GITHUB_ENV"

      - name: Assemble kugou-music debug APK
        run: ./gradlew :kugou-music:assembleDebug --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kugou-music-debug-apk
          path: kugou-music/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          archive: false
